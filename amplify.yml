version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm install 18
        - nvm use 18
        - npm ci
    build:
      commands:
        - echo "VITE_INVESTOR_SUPABASE_URL=$VITE_INVESTOR_SUPABASE_URL" > .env.production
        - echo "VITE_INVESTOR_SUPABASE_ANON_KEY=$VITE_INVESTOR_SUPABASE_ANON_KEY" >> .env.production
        - echo "VITE_API_BASE_URL=$VITE_API_BASE_URL" >> .env.production
        - echo "VITE_COGNITO_CLIENT_ID=$VITE_COGNITO_CLIENT_ID" >> .env.production
        - echo "VITE_COGNITO_DOMAIN=$VITE_COGNITO_DOMAIN" >> .env.production
        - echo "VITE_COGNITO_USER_POOL_ID=$VITE_COGNITO_USER_POOL_ID" >> .env.production
        - echo "VITE_REDIRECT_URI=$VITE_REDIRECT_URI" >> .env.production
        - echo "VITE_LOGOUT_URI=$VITE_LOGOUT_URI" >> .env.production
        - npm run build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
